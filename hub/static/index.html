<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veritas Hub</title>
<style>
  :root {
    --bg: #0a0e14; --panel: #111722; --line: #1e2733; --ink: #e6edf3;
    --dim: #8b98a9; --cyan: #22d3ee; --green: #34d399; --red: #f87171; --amber: #fbbf24;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font-family: system-ui, sans-serif; display: flex; min-height: 100vh; }
  aside { width: 210px; border-right: 1px solid var(--line); padding: 22px 14px; flex-shrink: 0; }
  .logo { font-weight: 800; letter-spacing: 1px; font-size: 18px; margin: 0 8px 28px; }
  .logo b { color: var(--cyan); }
  nav a { display: block; padding: 10px 12px; border-radius: 8px; color: var(--dim);
          text-decoration: none; cursor: pointer; font-size: 14px; margin-bottom: 4px; }
  nav a.active, nav a:hover { background: var(--panel); color: var(--ink); }
  main { flex: 1; padding: 30px 36px; overflow-y: auto; }
  h1 { margin: 0 0 22px; font-size: 26px; }
  h2 { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin: 28px 0 12px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  .card .label { color: var(--dim); font-size: 12px; }
  .card .num { font-size: 30px; font-weight: 700; margin-top: 6px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  input[type=text] { flex: 1; background: #0c1119; border: 1px solid var(--line); color: var(--ink);
         padding: 12px 14px; border-radius: 10px; font-size: 14px; }
  select { background: #0c1119; border: 1px solid var(--line); color: var(--ink);
         padding: 12px 10px; border-radius: 10px; font-size: 14px; }
  .pill.org { border-color: var(--cyan); color: var(--cyan); }
  .orginfo { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; font-size: 13px; color: var(--dim); }
  .orginfo .what { color: var(--ink); margin-bottom: 6px; font-size: 14px; }
  .orginfo b { color: var(--ink); font-weight: 600; }
  .orginfo .flow { margin: 4px 0; }
  .orginfo .chk { font-family: var(--mono); font-size: 12px; color: var(--cyan); }
  button { background: var(--cyan); color: #04222a; border: 0; padding: 12px 18px; border-radius: 10px;
           font-weight: 700; cursor: pointer; }
  button:disabled { opacity: .5; cursor: wait; }
  .mono { font-family: var(--mono); font-size: 12.5px; }
  .pill { font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--line); }
  .pass { color: var(--green); } .fail { color: var(--red); }
  .soft { color: var(--amber); }
  .tag { background: var(--green); color: #04241a; }
  .tag.rej { background: var(--red); color: #2a0808; }
  .gate { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12.5px; }
  .gate:last-child { border-bottom: 0; }
  .muted { color: var(--dim); font-size: 12.5px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hidden { display: none; }
  code { color: var(--cyan); }
</style>
</head>
<body>
<aside>
  <div class="logo">VERI<b>TAS</b></div>
  <nav>
    <a data-view="dashboard" class="active">Mission Control</a>
    <a data-view="runs">Runs</a>
    <a data-view="memory">Memory</a>
  </nav>
</aside>
<main>
  <section id="dashboard">
    <h1>Mission Control</h1>
    <div class="cards" id="stats"></div>
    <h2>New Run</h2>
    <div class="panel">
      <div class="row">
        <select id="org"></select>
        <input type="text" id="goal" placeholder="" />
        <button id="go">Run</button>
      </div>
      <div class="muted" id="runhint" style="margin-top:10px">The model proposes; the deterministic gates decide. A real run takes a few seconds.</div>
      <div id="orginfo" class="orginfo"></div>
    </div>
    <div id="latest"></div>
  </section>

  <section id="runs" class="hidden"><h1>Runs</h1><div id="runlist"></div></section>
  <section id="memory" class="hidden"><h1>Institutional Memory</h1><div id="memlist" class="grid2"></div></section>
</main>

<script>
const $ = s => document.querySelector(s);
const api = (p, opt) => fetch(p, opt).then(r => r.json());
const esc = s => (s ?? '').toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

document.querySelectorAll('nav a').forEach(a => a.onclick = () => {
  document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  ['dashboard','runs','memory'].forEach(v => $('#'+v).classList.toggle('hidden', v !== a.dataset.view));
  if (a.dataset.view === 'runs') loadRuns();
  if (a.dataset.view === 'memory') loadMemory();
  if (a.dataset.view === 'dashboard') loadDash();
});

function gateLine(g) {
  const cls = g.passed ? 'pass' : (g.determinism === 'soft' ? 'soft' : 'fail');
  const mark = g.passed ? 'pass' : 'FAIL';
  return `<div class="gate"><span><span class="${cls}">${mark}</span> &nbsp;${esc(g.gate)} <span class="muted">[${g.determinism}]</span></span><span class="muted">${esc(g.evidence)}</span></div>`;
}
function runCard(r) {
  const tag = r.accepted ? '<span class="pill tag">SHIPPED</span>' : '<span class="pill tag rej">REJECTED</span>';
  const org = r.org ? `<span class="pill org">${esc(r.org)}</span> ` : '';
  const arts = r.artifacts.map(a => `<span class="pill">${esc(a.type)} · ${esc(a.store)}</span>`).join(' ');
  const informed = r.informed_by && r.informed_by.length
    ? `<div class="muted" style="margin-top:8px">informed by ${r.informed_by.length} prior memory(ies): ${r.informed_by.map(esc).join(', ')}</div>` : '';
  return `<div class="panel"><div class="row" style="justify-content:space-between">
      <span>${org}<strong>${esc(r.goal)}</strong></span>${tag}</div>
      <div style="margin:10px 0">${arts}</div>
      ${r.gates.map(gateLine).join('')}
      ${informed}</div>`;
}

let ORGS = [];
async function loadOrgs() {
  ORGS = await api('/api/orgs');
  $('#org').innerHTML = ORGS.map(o => `<option value="${esc(o.name)}">${esc(o.title)}</option>`).join('');
  syncHint();
}
function syncHint() {
  const o = ORGS.find(x => x.name === $('#org').value);
  if (!o) return;
  $('#goal').placeholder = o.goal_hint;
  $('#orginfo').innerHTML =
    `<div class="what">${esc(o.description)}</div>
     <div class="flow">You give it <b>${esc(o.input_noun)}</b> → you get <b>${esc(o.produces)}</b></div>
     <div class="flow">Verified by: <span class="chk">${esc(o.verified_by)}</span></div>`;
}

async function loadDash() {
  const d = await api('/api/dashboard');
  $('#stats').innerHTML = [
    ['Total Runs', d.total_runs], ['Success Rate', d.success_rate + '%'],
    ['Memory Entries', d.memory_entries], ['Failures Recorded', d.failures]
  ].map(([l,n]) => `<div class="card"><div class="label">${l}</div><div class="num">${n}</div></div>`).join('');
}
async function loadRuns() {
  const runs = await api('/api/runs');
  $('#runlist').innerHTML = runs.length ? runs.map(runCard).join('') : '<div class="muted">No runs yet.</div>';
}
async function loadMemory() {
  const mem = await api('/api/memory');
  $('#memlist').innerHTML = mem.length ? mem.map(m => {
    const reason = m.rejected_because || m.accepted_because || '';
    const org = m.org ? `<span class="pill org">${esc(m.org)}</span> ` : '';
    return `<div class="panel"><div class="row" style="justify-content:space-between">
      <span>${org}<strong>${esc(m.title)}</strong></span><span class="pill">${esc(m.category)}</span></div>
      <div class="muted mono" style="margin-top:8px">${esc(reason)}</div></div>`;
  }).join('') : '<div class="muted">Memory is empty.</div>';
}

$('#org').onchange = syncHint;
$('#go').onclick = async () => {
  const goal = $('#goal').value.trim();
  if (!goal) return;
  $('#go').disabled = true; $('#runhint').textContent = 'Running… the cast is reviewing the proposal.';
  try {
    const r = await api('/api/runs', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({goal, org: $('#org').value}) });
    $('#latest').innerHTML = '<h2>Latest Run</h2>' + runCard(r);
    loadDash();
  } finally {
    $('#go').disabled = false; $('#runhint').textContent = 'The model proposes; the deterministic gates decide.';
  }
};

loadOrgs();
loadDash();
</script>
</body>
</html>
