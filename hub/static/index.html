<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veritas Hub</title>
<style>
  :root {
    --bg: #0a0e14; --panel: #111722; --line: #1e2733; --ink: #e6edf3;
    --dim: #8b98a9; --cyan: #22d3ee; --green: #34d399; --red: #f87171; --amber: #fbbf24;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font-family: system-ui, sans-serif; display: flex; min-height: 100vh; }
  aside { width: 210px; border-right: 1px solid var(--line); padding: 22px 14px; flex-shrink: 0; }
  .logo { font-weight: 800; letter-spacing: 1px; font-size: 18px; margin: 0 8px 6px; }
  .logo b { color: var(--cyan); }
  .tagline { color: var(--dim); font-size: 11px; margin: 0 8px 26px; line-height: 1.4; }
  nav a { display: block; padding: 10px 12px; border-radius: 8px; color: var(--dim);
          text-decoration: none; cursor: pointer; font-size: 14px; margin-bottom: 4px; }
  nav a.active, nav a:hover { background: var(--panel); color: var(--ink); }
  main { flex: 1; padding: 30px 36px; overflow-y: auto; }
  h1 { margin: 0 0 22px; font-size: 26px; }
  h2 { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin: 28px 0 12px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  .card .label { color: var(--dim); font-size: 12px; }
  .card .num { font-size: 30px; font-weight: 700; margin-top: 6px; }
  .card .num.good { color: var(--green); }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .row { display: flex; gap: 10px; align-items: center; }
  input[type=text] { flex: 1; min-width: 0; background: #0c1119; border: 1px solid var(--line); color: var(--ink);
         padding: 12px 14px; border-radius: 10px; font-size: 14px; }
  select { background: #0c1119; border: 1px solid var(--line); color: var(--ink);
         padding: 12px 10px; border-radius: 10px; font-size: 14px; }
  .pill.org { border-color: var(--cyan); color: var(--cyan); }
  .orginfo { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; font-size: 13px; color: var(--dim); }
  .orginfo .what { color: var(--ink); margin-bottom: 6px; font-size: 14px; }
  .orginfo b { color: var(--ink); font-weight: 600; }
  .orginfo .flow { margin: 4px 0; }
  .orginfo .chk { font-family: var(--mono); font-size: 12px; color: var(--cyan); }
  .artifact { margin-top: 12px; }
  .artifact .loc { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-bottom: 4px; }
  pre.code { background: #0c1119; border: 1px solid var(--line); border-radius: 8px; padding: 11px 13px;
             overflow-x: auto; font-family: var(--mono); font-size: 12px; color: var(--ink);
             white-space: pre; margin: 0; line-height: 1.5; }
  button { background: var(--cyan); color: #04222a; border: 0; padding: 12px 18px; border-radius: 10px;
           font-weight: 700; cursor: pointer; }
  button:disabled { opacity: .5; cursor: wait; }
  .mono { font-family: var(--mono); font-size: 12.5px; }
  .pill { font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--line); }
  .pass { color: var(--green); } .fail { color: var(--red); }
  .soft { color: var(--amber); }
  .muted { color: var(--dim); font-size: 12.5px; }
  .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .hidden { display: none; }
  code { color: var(--cyan); }

  /* --- the verdict: trust made visible --- */
  .runhead { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .verdict { font-size: 17px; font-weight: 800; margin: 12px 0 14px; letter-spacing: .5px;
             display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
  .verdict.shipped { color: var(--green); }
  .verdict.rejected { color: var(--red); }
  .verdict .earned { font-weight: 500; font-size: 12.5px; color: var(--dim); letter-spacing: 0; }

  /* --- the gate ledger: HARD decides, soft advises --- */
  .gates { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .gate { padding: 9px 12px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12.5px; }
  .gate:last-child { border-bottom: 0; }
  .gate.hard { background: rgba(34, 211, 238, .035); }
  .gate.soft { opacity: .62; }
  .gate.finalauth { border-top: 2px solid var(--line); background: rgba(52, 211, 153, .04); }
  .grow { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .gname { white-space: nowrap; }
  .marker { font-size: 11px; }
  .tier { font-size: 9.5px; letter-spacing: .5px; padding: 1px 5px; border-radius: 4px;
          border: 1px solid var(--line); margin: 0 6px 0 4px; color: var(--dim); }
  .gate.hard .tier { color: var(--cyan); border-color: rgba(34, 211, 238, .4); }
  .gverdict { font-weight: 700; white-space: nowrap; }
  .gev { color: var(--dim); font-size: 11.5px; margin-top: 3px; line-height: 1.45;
         white-space: pre-wrap; word-break: break-word; }

  /* --- dashboard activity --- */
  .bar { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; }
  .barlabel { width: 96px; color: var(--dim); }
  .bartrack { flex: 1; height: 8px; background: #0c1119; border-radius: 5px; overflow: hidden; }
  .barfill { display: block; height: 100%; background: var(--cyan); border-radius: 5px; }
  .barnum { width: 30px; text-align: right; font-family: var(--mono); }
  .recentrow { padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13px; display: flex; gap: 8px; align-items: baseline; }
  .recentrow:last-child { border-bottom: 0; }
  .recentrow .rg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }

  /* --- the Org view: the cast + the gates --- */
  .castrow { padding: 9px 0; border-bottom: 1px solid var(--line); }
  .castrow:last-child { border-bottom: 0; }
  .role { font-family: var(--mono); font-size: 10.5px; color: var(--cyan);
          border: 1px solid rgba(34, 211, 238, .3); border-radius: 4px; padding: 1px 5px; margin-right: 6px; }
  .scopelabel { font-family: var(--mono); font-size: 10.5px; letter-spacing: .5px; text-transform: uppercase;
                color: var(--dim); margin: 14px 0 4px; }
  .scopelabel:first-child { margin-top: 2px; }
  .orgprinciple { margin-top: 12px; padding: 11px 13px; border-left: 3px solid var(--cyan);
                  background: rgba(34, 211, 238, .05); border-radius: 0 8px 8px 0;
                  color: var(--ink); font-size: 13px; line-height: 1.5; }

  /* --- the live run timeline (D) --- */
  .verdict.running { color: var(--cyan); }
  .livedot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
             background: var(--cyan); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .tlrow { display: flex; gap: 10px; align-items: baseline; padding: 7px 12px;
           border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12px;
           animation: slidein .18s ease-out; }
  .tlrow:last-child { border-bottom: 0; }
  @keyframes slidein { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; } }
  .tlphase { font-size: 9px; letter-spacing: .5px; text-transform: uppercase; padding: 2px 6px;
             border-radius: 4px; border: 1px solid var(--line); color: var(--dim);
             min-width: 70px; text-align: center; flex-shrink: 0; }
  .tlphase.verify { color: var(--cyan); border-color: rgba(34, 211, 238, .4); }
  .tlphase.persist { color: var(--green); border-color: rgba(52, 211, 153, .4); }
  .tlphase.synthesize { color: var(--amber); border-color: rgba(251, 191, 36, .4); }
  .tlactor { font-weight: 700; min-width: 110px; flex-shrink: 0; }
  .tlmsg { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tldur { margin-left: auto; flex-shrink: 0; }
</style>
</head>
<body>
<aside>
  <div class="logo">VERI<b>TAS</b></div>
  <div class="tagline">The model proposes. The gates decide.</div>
  <nav>
    <a data-view="dashboard" class="active">Mission Control</a>
    <a data-view="orgview">Organization</a>
    <a data-view="runs">Runs</a>
    <a data-view="memory">Memory</a>
  </nav>
</aside>
<main>
  <section id="dashboard">
    <h1>Mission Control</h1>
    <div class="cards" id="stats"></div>

    <div class="grid2" style="margin-top:22px">
      <div><h2 style="margin-top:0">By Organization</h2><div class="panel" id="byorg"></div></div>
      <div><h2 style="margin-top:0">Recent</h2><div class="panel" id="recent"></div></div>
    </div>

    <h2>New Run</h2>
    <div class="panel">
      <div class="row">
        <select id="org"></select>
        <select id="model" title="local is free; Claude models cost a few cents per build"></select>
        <input type="text" id="goal" placeholder="" />
        <button id="go">Run</button>
      </div>
      <div class="muted" id="runhint" style="margin-top:10px">The model proposes; the deterministic gates decide. A real run takes a few seconds.</div>
      <div id="orginfo" class="orginfo"></div>
    </div>
    <div id="latest"></div>
  </section>

  <section id="orgview" class="hidden"><h1>The Organization</h1><div id="orgbody"></div></section>
  <section id="runs" class="hidden"><h1>Runs</h1><div id="runlist"></div></section>
  <section id="memory" class="hidden"><h1>Institutional Memory</h1><div id="memlist" class="grid2"></div></section>
</main>

<script>
const $ = s => document.querySelector(s);
const api = (p, opt) => fetch(p, opt).then(r => r.json());
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const isHard = g => g.determinism !== 'soft';

document.querySelectorAll('nav a').forEach(a => a.onclick = () => {
  document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  ['dashboard','orgview','runs','memory'].forEach(v => $('#'+v).classList.toggle('hidden', v !== a.dataset.view));
  if (a.dataset.view === 'runs') loadRuns();
  if (a.dataset.view === 'memory') loadMemory();
  if (a.dataset.view === 'dashboard') loadDash();
  if (a.dataset.view === 'orgview') loadOrg();
});

// A gate row that makes the hard/soft split visceral: HARD gates are filled and tinted
// (they decide); soft gates are dimmed (they only advise). Validation is foregrounded.
function gateLine(g) {
  const hard = isHard(g), final = g.gate === 'validation';
  const marker = hard ? '●' : '○';                 // ● filled (hard) vs ○ hollow (soft)
  const vcls = g.passed ? 'pass' : (hard ? 'fail' : 'soft');
  let verdict;
  if (final) verdict = g.passed ? 'APPROVED' : 'WITHHELD';
  else verdict = g.passed ? 'pass' : (hard ? 'FAIL' : 'flag');
  return `<div class="gate ${hard ? 'hard' : 'soft'}${final ? ' finalauth' : ''}">
      <div class="grow">
        <span class="gname"><span class="marker ${vcls}">${marker}</span><span class="tier">${hard ? 'HARD' : 'soft'}</span>${esc(g.gate)}</span>
        <span class="gverdict ${vcls}">${verdict}</span>
      </div>
      <div class="gev">${esc(g.evidence)}</div>
    </div>`;
}

function verdictBanner(r) {
  const hardGates = r.gates.filter(g => isHard(g) && g.gate !== 'validation');
  if (r.accepted) {
    const n = hardGates.filter(g => g.passed).length;
    return `<div class="verdict shipped">SHIPPED <span class="earned">— earned by ${n} hard gate${n === 1 ? '' : 's'}, no judgment alone</span></div>`;
  }
  const blocked = hardGates.filter(g => !g.passed);
  const names = blocked.map(g => g.gate).join(', ');
  return `<div class="verdict rejected">REJECTED <span class="earned">— ${blocked.length} hard gate${blocked.length === 1 ? '' : 's'} blocked it${names ? ' (' + esc(names) + ')' : ''}</span></div>`;
}

function artifactBlock(org, a) {
  const loc = `hub_data/memory/${esc(org)}/${esc(a.store)}/${esc(a.file)}`;
  const body = a.payload ? `<pre class="code">${esc(a.payload)}</pre>` : '';
  return `<div class="artifact"><div class="loc">${esc(a.type)} → ${loc}</div>${body}</div>`;
}
function runCard(r) {
  const org = r.org ? `<span class="pill org">${esc(r.org)}</span> ` : '';
  const model = r.model ? `<span class="pill">${esc(r.model)}</span> ` : '';
  const informed = r.informed_by && r.informed_by.length
    ? `<div class="muted" style="margin-top:8px">informed by ${r.informed_by.length} prior memory(ies): ${r.informed_by.map(esc).join(', ')}</div>` : '';
  return `<div class="panel">
      <div class="runhead"><span>${org}${model}<strong>${esc(r.goal)}</strong></span></div>
      ${verdictBanner(r)}
      <div class="gates">${r.gates.map(gateLine).join('')}</div>
      ${r.artifacts.map(a => artifactBlock(r.org, a)).join('')}
      ${informed}</div>`;
}

let ORGS = [];
async function loadOrgs() {
  ORGS = await api('/api/orgs');
  $('#org').innerHTML = ORGS.map(o => `<option value="${esc(o.name)}">${esc(o.title)}</option>`).join('');
  syncHint();
}
async function loadModels() {
  const models = await api('/api/models');
  $('#model').innerHTML = models.map(m => `<option value="${esc(m.name)}">${esc(m.label)} · ${esc(m.cost)}</option>`).join('');
}
function syncHint() {
  const o = ORGS.find(x => x.name === $('#org').value);
  if (!o) return;
  $('#goal').placeholder = o.goal_hint;
  $('#orginfo').innerHTML =
    `<div class="what">${esc(o.description)}</div>
     <div class="flow">You give it <b>${esc(o.input_noun)}</b> → you get <b>${esc(o.produces)}</b></div>
     <div class="flow">Verified by: <span class="chk">${esc(o.verified_by)}</span></div>`;
}

async function loadDash() {
  const d = await api('/api/dashboard');
  $('#stats').innerHTML = [
    ['Total Runs', d.total_runs, ''],
    ['Success Rate', d.success_rate + '%', d.success_rate >= 50 ? 'good' : ''],
    ['Memory Entries', d.memory_entries, ''],
    ['Failures Recorded', d.failures, '']
  ].map(([l,n,c]) => `<div class="card"><div class="label">${l}</div><div class="num ${c}">${n}</div></div>`).join('');

  const entries = Object.entries(d.by_org || {});
  const max = Math.max(1, ...entries.map(([,n]) => n));
  $('#byorg').innerHTML = entries.length && entries.some(([,n]) => n)
    ? entries.map(([name,n]) => `<div class="bar">
        <span class="barlabel">${esc(name)}</span>
        <span class="bartrack"><span class="barfill" style="width:${Math.round(n/max*100)}%"></span></span>
        <span class="barnum">${n}</span></div>`).join('')
    : '<div class="muted">No runs yet — start one below.</div>';

  $('#recent').innerHTML = (d.recent || []).length
    ? d.recent.map(r => {
        const cls = r.accepted ? 'pass' : 'fail', mk = r.accepted ? '✓' : '✗';
        return `<div class="recentrow"><span class="${cls}">${mk}</span><span class="muted">${esc(r.org || '')}</span><span class="rg">${esc(r.goal)}</span></div>`;
      }).join('')
    : '<div class="muted">No runs yet.</div>';
}
// A gate row in the Org view: same hard/soft vocabulary as the run ledger, but describing
// what each gate is FOR rather than a verdict it returned.
function gateRosterRow(g) {
  const hard = g.determinism !== 'soft';
  const marker = hard ? '●' : '○';
  const color = hard ? 'var(--cyan)' : 'var(--amber)';
  return `<div class="gate ${hard ? 'hard' : 'soft'}">
      <div class="grow"><span class="gname"><span class="marker" style="color:${color}">${marker}</span><span class="tier">${hard ? 'HARD' : 'soft'}</span>${esc(g.name)}</span></div>
      <div class="gev">${esc(g.about)}</div></div>`;
}

async function loadOrg() {
  const name = (ORGS[0] && ORGS[0].name) || 'software';
  const o = ORGS.find(x => x.name === name) || {};
  const r = await api(`/api/orgs/${name}/roster`);
  if (r.error) { $('#orgbody').innerHTML = `<div class="muted">${esc(r.error)}</div>`; return; }

  const cast = r.cast.map(c => `<div class="castrow">
      <div><span class="role">${esc(c.role)}</span><strong>${esc(c.name)}</strong></div>
      <div class="gev">${esc(c.produces)}</div></div>`).join('');

  const labels = { function: 'Function', module: 'Module', app: 'App', all: 'Every run' };
  const gates = ['function','module','app','all'].map(s => {
    const gs = r.gates.filter(g => g.scope === s);
    return gs.length ? `<div class="scopelabel">${labels[s]}</div>${gs.map(gateRosterRow).join('')}` : '';
  }).join('');

  $('#orgbody').innerHTML = `
    <div class="panel">
      <div style="font-size:18px;font-weight:700">${esc(o.title || name)}</div>
      <div class="muted" style="margin-top:6px">${esc(o.description || '')}</div>
      <div class="orgprinciple">${esc(r.principle)}</div>
    </div>
    <div class="grid2">
      <div><h2 style="margin-top:6px">The cast — proposers</h2><div class="panel">${cast}</div></div>
      <div><h2 style="margin-top:6px">The decision engine — gates</h2><div class="panel">${gates}</div></div>
    </div>`;
}

async function loadRuns() {
  const runs = await api('/api/runs');
  $('#runlist').innerHTML = runs.length ? runs.map(runCard).join('') : '<div class="muted">No runs yet.</div>';
}
async function loadMemory() {
  const mem = await api('/api/memory');
  $('#memlist').innerHTML = mem.length ? mem.map(m => {
    const reason = m.rejected_because || m.accepted_because || '';
    const org = m.org ? `<span class="pill org">${esc(m.org)}</span> ` : '';
    const loc = m.file ? `<div class="loc">${esc(m.file)}</div>` : '';
    const body = m.body ? `<pre class="code">${esc(m.body)}</pre>` : '';
    return `<div class="panel"><div class="row" style="justify-content:space-between">
      <span>${org}<strong>${esc(m.title)}</strong></span><span class="pill">${esc(m.category)}</span></div>
      <div class="muted mono" style="margin:8px 0">${esc(reason)}</div>
      ${loc}${body}</div>`;
  }).join('') : '<div class="muted">Memory is empty.</div>';
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// One line in the live timeline. The phase chip and a pass/fail tint let you read the run
// as it happens; the full hard/soft ledger renders once it finishes.
function timelineRow(ev) {
  const m = ev.message || '';
  const cls = (m.startsWith('PASS') || m.startsWith('accepted') || m.startsWith('APPROVED')) ? 'pass'
            : (m.startsWith('FAIL') || m.startsWith('rejected') || m.startsWith('WITHHELD')) ? 'fail' : 'muted';
  const dur = ev.duration_ms ? `<span class="muted tldur">${ev.duration_ms}ms</span>` : '';
  return `<div class="tlrow"><span class="tlphase ${esc(ev.phase)}">${esc(ev.phase)}</span><span class="tlactor">${esc(ev.actor)}</span><span class="tlmsg ${cls}">${esc(m)}</span>${dur}</div>`;
}

function runError(msg) {
  $('#latest').innerHTML = `<h2>Latest Run</h2><div class="panel"><span class="fail">Run failed:</span> <span class="mono">${esc(msg)}</span><div class="muted" style="margin-top:6px">Claude models need ANTHROPIC_API_KEY set where the hub runs.</div></div>`;
}

$('#org').onchange = syncHint;
$('#go').onclick = async () => {
  const goal = $('#goal').value.trim();
  if (!goal) return;
  $('#go').disabled = true;
  $('#runhint').textContent = 'Running… watch the cast propose and the gates decide.';
  $('#latest').innerHTML = `<h2>Latest Run</h2><div class="panel">
      <div class="verdict running"><span class="livedot"></span> RUNNING…</div>
      <div id="timeline" class="gates"></div></div>`;
  try {
    const start = await api('/api/runs/start', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({goal, org: $('#org').value, model: $('#model').value}) });
    if (start.error || !start.token) { runError(start.error || 'could not start run'); return; }
    while (true) {
      const p = await api('/api/runs/progress/' + start.token);
      if (p.error) { runError(p.error); return; }
      const tl = $('#timeline');
      if (tl) tl.innerHTML = p.events.map(timelineRow).join('');
      if (p.done) {
        if (p.error) runError(p.error);
        else if (p.run) { $('#latest').innerHTML = '<h2>Latest Run</h2>' + runCard(p.run); loadDash(); }
        return;
      }
      await sleep(350);
    }
  } finally {
    $('#go').disabled = false;
    $('#runhint').textContent = 'The model proposes; the deterministic gates decide.';
  }
};

loadOrgs();
loadModels();
loadDash();
</script>
</body>
</html>
